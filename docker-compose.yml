services:
  mahjong:
    build: .
    image: mahjong-calc
    container_name: mahjong-calc
    ports:
      # host port : container port. Change APP_PORT in .env to avoid conflicts.
      - '${APP_PORT:-5173}:5173'
    environment:
      - PORT=5173
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY:-}
      - ROBOFLOW_BASE_URL=${ROBOFLOW_BASE_URL:-https://serverless.roboflow.com}
      - ROBOFLOW_MODEL=${ROBOFLOW_MODEL:-riichi-mahjong-tiles-y8hce/1}
      - ROBOFLOW_CONFIDENCE=${ROBOFLOW_CONFIDENCE:-30}
      - ROBOFLOW_OVERLAP=${ROBOFLOW_OVERLAP:-30}
      - ROBOFLOW_DEDUP_IOU=${ROBOFLOW_DEDUP_IOU:-0.55}
    restart: unless-stopped
